version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
    day: wednesday
    time: "03:00"
    timezone: Europe/London
  cooldown:
    default-days: 7
  groups:
    babel:
      patterns:
        - "*babel*"
    datatables:
      patterns:
        - "*datatables*"
    postcss:
      patterns:
        - "postcss"
        - "postcss-*"
  open-pull-requests-limit: 10
  allow:
    - dependency-type: "all"
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: daily
    day: wednesday
    time: "03:00"
    timezone: Europe/London
  cooldown:
    default-days: 7
  groups:
    aws:
      patterns:
        - "aws-*"
    dotenv:
      patterns:
        - "dotenv*"
    rails:
      patterns:
        - "rails"
        - "action*"
        - "active*"
    rubocop:
      patterns:
        - "rubocop*"
    sentry:
      patterns:
        - "sentry-*"
  open-pull-requests-limit: 5
  rebase-strategy: "disabled"
  allow:
    - dependency-type: "all"
  ignore:
    - dependency-name: "rails"
      versions:
        - ">= 7.2"
    - dependency-name: "active*"
      versions:
        - ">= 7.2"
    - dependency-name: "action*"
      versions:
        - ">= 7.2"
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
    day: tuesday
    time: "03:00"
    timezone: Europe/London
  cooldown:
    default-days: 7
  open-pull-requests-limit: 5
  rebase-strategy: "disabled"
  allow:
    - dependency-type: "all"
