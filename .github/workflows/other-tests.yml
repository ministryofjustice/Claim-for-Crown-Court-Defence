name: Test Branch

# This workflow mirrors CircleCI's test-branch workflow
# It builds the test container, runs linting/security checks, and RSpec tests

on:
  push:
    branches:
      - zia/test-migrate-to-gh-actions
  pull_request:
    branches:
      - zia/test-migrate-to-gh-actions

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUBY_VERSION: 3.4.2
  NODE_VERSION: 20
  RAILS_ENV: test
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/cccd_test
  TZ: Europe/London

jobs:
  build-test-container:
    name: Build Test Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create workspace temporary directories
        run: |
          mkdir -p tmp/
          mkdir -p tmp/coverage/
          mkdir -p /tmp/test-results/rspec
          mkdir -p /tmp/test-results/cucumber

      - name: Install bundler and gem dependencies
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install javascript package dependencies
        run: yarn install --frozen-lockfile

  other-tests:
    name: Other Tests (Linting & Security)
    runs-on: ubuntu-latest
    needs: build-test-container

    strategy:
      fail-fast: false
      matrix:
        test: [rubocop, brakeman, standardjs, stylelint, jasmine]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        if: matrix.test == 'rubocop' || matrix.test == 'brakeman' || matrix.test == 'jasmine'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Set up Node.js
        if: matrix.test == 'standardjs' || matrix.test == 'stylelint' || matrix.test == 'jasmine'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install JavaScript dependencies
        if: matrix.test == 'standardjs' || matrix.test == 'stylelint' || matrix.test == 'jasmine'
        run: yarn install --frozen-lockfile

      - name: Install Chrome
        if: matrix.test == 'jasmine'
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        if: matrix.test == 'jasmine'
        uses: nanasess/setup-chromedriver@v2

      - name: Precompile assets
        if: matrix.test == 'jasmine'
        run: bundle exec rails assets:precompile

      - name: Run test
        run: |
          case "${{ matrix.test }}" in
            rubocop)
              bundle exec rubocop
              ;;
            brakeman)
              bundle exec brakeman
              ;;
            standardjs)
              yarn run validate:js
              ;;
            stylelint)
              yarn run validate:scss
              ;;
            jasmine)
              bundle exec rails jasmine:run
              ;;
          esac

  rspec-tests:
    name: RSpec Tests
    runs-on: ubuntu-latest
    needs: build-test-container

    strategy:
      fail-fast: false
      matrix:
        ci_node_total: [6]
        ci_node_index: [0, 1, 2, 3, 4, 5]

    services:
      postgres:
        image: cimg/postgres:13.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cccd_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Wait for database
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Database is ready!"
              break
            fi
            echo "Waiting for database... ($i/30)"
            sleep 2
          done

      - name: Setup database
        run: bin/rails db:schema:load --trace

      - name: Precompile assets
        run: bundle exec rails assets:precompile

      - name: Run RSpec tests (shard ${{ matrix.ci_node_index }}/${{ matrix.ci_node_total }})
        run: |
          mkdir -p tmp/test-results/rspec
          SPEC_FILES=$(bundle exec rspec --dry-run --format json | \
            jq -r '.examples[].id' | \
            awk "NR % ${{ matrix.ci_node_total }} == ${{ matrix.ci_node_index }}")

          if [ -n "$SPEC_FILES" ]; then
            bundle exec rspec \
              --format progress \
              --format RspecJunitFormatter \
              --out tmp/test-results/rspec/rspec-${{ matrix.ci_node_index }}.xml \
              $SPEC_FILES
          else
            echo "No specs to run for this shard"
          fi

      - name: Upload coverage results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.ci_node_index }}
          path: tmp/coverage/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rspec-results-${{ matrix.ci_node_index }}
          path: tmp/test-results/rspec/
          retention-days: 7

  # Summary job - useful for branch protection rules
  test-branch-summary:
    name: Test Branch - All Tests Passed
    runs-on: ubuntu-latest
    needs: [build-test-container, other-tests, rspec-tests]
    if: always()

    steps:
      - name: Check if all tests passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ Some tests failed"
            exit 1
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "🚫 Some tests were cancelled"
            exit 1
          else
            echo "✅ All tests passed!"
          fi
