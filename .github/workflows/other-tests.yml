name: Other Tests (Linting & Security)

# This workflow runs linting and security checks
# It's the simplest workflow - no database, no parallelization
# Perfect for learning GitHub Actions!

on:
  push:
    branches: ["**"] # Run on all branches
  pull_request:
    branches: ["**"]

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUBY_VERSION: 3.4.2
  NODE_VERSION: 18
  RAILS_ENV: test

jobs:
  rubocop:
    name: Rubocop (Ruby Linting)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true # Automatically caches gems

      - name: Run Rubocop
        run: bundle exec rubocop

  brakeman:
    name: Brakeman (Security Scanner)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Run Brakeman
        run: bundle exec brakeman

  standardjs:
    name: StandardJS (JavaScript Linting)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn" # Automatically caches node_modules

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run StandardJS
        run: yarn run validate:js

  stylelint:
    name: Stylelint (SCSS Linting)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Stylelint
        run: yarn run validate:scss

  jasmine:
    name: Jasmine (JavaScript Tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Precompile assets
        run: bundle exec rails assets:precompile

      - name: Run Jasmine tests
        run: bundle exec rails jasmine:run

  # Summary job - useful for branch protection rules
  # You can require just this one job instead of all 5
  all-other-tests:
    name: All Other Tests Passed
    runs-on: ubuntu-latest
    needs: [rubocop, brakeman, standardjs, stylelint, jasmine]
    if: always()

    steps:
      - name: Check if all tests passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ Some tests failed"
            exit 1
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "🚫 Some tests were cancelled"
            exit 1
          else
            echo "✅ All tests passed!"
          fi
